site_name: 🧙‍♂️ 数据分析师 · Python 终极知识库
site_url: ""
site_description: 从 Python 基础到机器学习、NLP、因果推断的一站式速查手册
site_author: Your_Name_Here

# 主题配置
theme:
  name: material
  language: zh
  palette:
    # 浅色/深色模式切换
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
    - scheme: default
      primary: indigo
      accent: pink
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
  features:
    - navigation.instant      # 即时导航 (SPA 体验)
    - navigation.tabs          # 顶部标签栏
    - navigation.sections      # 左侧导航分组
    - navigation.expand        # 自动展开导航
    - navigation.top           # 回到顶部按钮
    - search.suggest           # 搜索建议
    - search.highlight         # 搜索高亮
    - content.code.copy        # 代码一键复制按钮
    - toc.follow               # 目录跟随滚动
  icon:
    logo: material/book-open-variant

# 搜索 (lunr + jieba 中文分词, 不启用英文 stemmer 避免代码术语被错误变形)
plugins:
  - search:
      lang:
        - zh
      separator: '[\s\u200b\u3000\-\.\(\)\`\=\_、。，．？！；：]+'

# Markdown 扩展 (代码高亮、数学公式、提示框)
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite      # 行内代码高亮
  - pymdownx.arithmatex:       # LaTeX 数学公式
      generic: true
  - admonition                 # 提示框 (Note/Warning/Tip)
  - pymdownx.details           # 可折叠提示框
  - pymdownx.tabbed:            # Tab 切换面板
      alternate_style: true
  - tables                     # 表格支持
  - attr_list                  # 属性列表
  - md_in_html                 # HTML 内嵌 Markdown

# 自定义样式 (代码块自适应宽度)
extra_css:
  - stylesheets/extra.css
  - https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css

# 数学公式渲染 (MathJax - 按官方文档配置，使用 CDN 加载)
# 参考: https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown-extensions/#arithmatex
extra_javascript:
  - javascripts/mathjax.js
  - javascripts/tracker.js
  - javascripts/mermaid_fullscreen.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
  - https://code.jquery.com/jquery-3.7.1.min.js
  - https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js
  - javascripts/datatables_init.js

# 页脚
extra:
  generator: false

# 不使用目录式 URL (离线浏览兼容)
use_directory_urls: false

